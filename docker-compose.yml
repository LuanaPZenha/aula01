services:
  # Serviço do Banco de Dados (MongoDB)
  mongodb:
    image: mongo:latest
    container_name: mongodb_aula
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Serviço da nossa API Node.js
  app:
    build: .
    container_name: node_app_aula
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/LZDB

volumes:
  mongo-data:
