services:
  mongodb:
    image: mongo:7
    container_name: mongo_fullstack
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db

  mysql:
    image: mysql:8
    container_name: mysql_fullstack
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: loja_de_carros
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: node_app_fullstack
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - mysql
    environment:
      - MONGO_URI=mongodb://mongodb:27017/loja_de_carros
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=loja_de_carros

volumes:
  mongo_data:
  mysql_data:
